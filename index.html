function authErr(e){ const c=(e&&e.code)?e.code:"";
  if(c==="auth/invalid-email") return "Email non valida.";
  if(c==="auth/user-not-found"||c==="auth/wrong-password"||c==="auth/invalid-credential"||c==="auth/invalid-login-credentials") return "Email o password errate.";
  if(c==="auth/email-already-in-use") return "Esiste gi\u00E0 un account con questa email: usa Accedi.";
  if(c==="auth/weak-password") return "Password troppo debole (minimo 6 caratteri).";
  if(c==="auth/too-many-requests") return "Troppi tentativi: riprova pi\u00F9 tardi.";
  if(c==="auth/operation-not-allowed") return "Accesso email/password non attivo su Firebase (l'admin deve abilitarlo).";
  if(c==="auth/network-request-failed") return "Connessione assente. Riprova.";
  return "Operazione non riuscita. Riprova.";
}
function LoginScreen(){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState(""); const [pwd,setPwd]=useState(""); const [nome,setNome]=useState("");
  const [err,setErr]=useState(""); const [info,setInfo]=useState(""); const [busy,setBusy]=useState(false);
  function submit(){ setErr(""); setInfo(""); const em=email.trim().toLowerCase();
    if(!em||em.indexOf("@")<0){ setErr("Inserisci un'email valida."); return; }
    if(pwd.length<6){ setErr("La password deve avere almeno 6 caratteri."); return; }
    if(mode==="register" && !nome.trim()){ setErr("Inserisci nome e cognome."); return; }
    setBusy(true);
    if(mode==="login"){ auth.signInWithEmailAndPassword(em,pwd).catch(e=>{ setBusy(false); setErr(authErr(e)); }); }
    else { auth.createUserWithEmailAndPassword(em,pwd).then(cred=>{ if(cred&&cred.user){ try{ cred.user.updateProfile({displayName:nome.trim()}); }catch(e2){} } }).catch(e=>{ setBusy(false); setErr(authErr(e)); }); }
  }
  function reset(){ setErr(""); setInfo(""); const em=email.trim().toLowerCase();
    if(!em||em.indexOf("@")<0){ setErr("Scrivi prima la tua email qui sopra, poi premi \u201CPassword dimenticata?\u201D."); return; }
    setBusy(true);
    auth.sendPasswordResetEmail(em).then(function(){ setBusy(false); setInfo("Ti abbiamo inviato un'email per reimpostare la password (controlla anche lo spam)."); }).catch(function(e){ setBusy(false); const c=(e&&e.code)?e.code:""; if(c==="auth/user-not-found") setErr("Non risulta un account con questa email: usa Registrati."); else setErr(authErr(e)); });
  }
  return (<div className="wrap"><div className="login">
    <h1>Calendario occupazioni CDQ</h1>

    {mode==="register" && <div className="field" style={{textAlign:"left"}}><label>Nome e cognome</label><input type="text" value={nome} autoComplete="name" onChange={ev=>setNome(ev.target.value)} /></div>}
    <div className="field" style={{textAlign:"left"}}><label>Password</label><input type="password" value={pwd} autoComplete={mode==="login"?"current-password":"new-password"} onChange={ev=>setPwd(ev.target.value)} onKeyDown={ev=>{ if(ev.key==="Enter") submit(); }} /></div>
    {err && <div className="err" style={{textAlign:"left"}}>{err}</div>}
    {info && <div style={{color:"#1B7A3E",fontSize:12.5,textAlign:"left",margin:"-2px 0 8px"}}>{info}</div>}
    <button className="btn primary" style={{width:"100%",marginTop:4}} disabled={busy} onClick={submit}>{busy?"Attendere\u2026":(mode==="login"?"Accedi":"Registrati")}</button>

    <div style={{marginTop:12,fontSize:13}}>
      {mode==="login"
        ? <span className="muted">Non hai un account? <a style={{cursor:"pointer",textDecoration:"underline"}} onClick={()=>{setMode("register");setErr("");setInfo("");}}>Registrati</a></span>

/* ---------- Home ---------- */
function fasceText(arr,d){ const f=arr.filter(x=>x.day===d).sort((a,b)=>a.start-b.start); if(f.length===0) return null; return f.map(x=>slotToTime(x.start)+"\u2013"+slotToTime(x.end)).join(", "); }
function HomeView({seg,periodi,curPer,isAdmin,onEditSede,goCal}){
  const per=periodi.find(p=>p.id===curPer);
  return (<div>
    <div className="strip" style={{display:"block"}}><b>Riepilogo segreteria</b> <span className="muted">&middot; {per?("periodo: "+per.nome+" ("+isoToIt(per.inizio)+"\u2013"+isoToIt(per.fine)+")"):""}. Le ore di segreteria appaiono incorniciate nel calendario col colore della sede.</span></div>
    <div className="home-grid">{SEDE_NAMES.map(s=>{ const arr=seg[s]||[];
      return (<div className="seg-card" key={s} style={{borderTopColor:sedeColor(s)}}>
        <h3><span className="sededot" style={{background:sedeColor(s)}}></span>{s}</h3>
        {DAYS.map((d,i)=>{ const t=fasceText(arr,i); if(!t) return null; return <div className="seg-row" key={i}><span>{d}</span><span className="muted">{t}</span></div>; })}
        {arr.length===0 && <div className="seg-empty">Nessuna presenza impostata.</div>}
        <div className="acts">{isAdmin && <button className="btn sm" onClick={()=>onEditSede(s)}>Modifica orari</button>}
          <button className="btn sm ghost" style={{marginLeft:6}} onClick={()=>goCal(s)}>Apri calendario</button></div>
      </div>); })}</div>
  </div>);
}

/* ---------- editor segreteria ---------- */
function SegEditor({sede,seg,onClose,onSave}){
  const [list,setList]=useState((seg[sede]||[]).map(x=>Object.assign({},x)));
  const [selDays,setSelDays]=useState([]);
  const [s,setS]=useState(4),[e,setE]=useState(20);
  function toggle(d){ setSelDays(p=> p.indexOf(d)>=0? p.filter(x=>x!==d): p.concat([d]).sort((a,b)=>a-b)); }
  function addTo(cur){ let n=cur.slice(); selDays.forEach(d=>{ if(!n.some(x=>x.day===d&&x.start===s&&x.end===e)) n.push({day:d,start:s,end:e}); }); return n.sort((a,b)=>a.day-b.day||a.start-b.start); }
  function add(){ if(selDays.length===0){ alert("Scegli almeno un giorno."); return; } if(e<=s){ alert("L'ora di fine deve essere dopo l'inizio."); return; } setList(p=>addTo(p)); }
  function save(){ if(selDays.length>0 && e<=s){ alert("L'ora di fine deve essere dopo l'inizio."); return; }
    const finalList=(selDays.length>0 && e>s)?addTo(list):list;
    const next=Object.assign({},seg); next[sede]=finalList; onSave(next); onClose(); }
  return (<div className="ovl open" onClick={ev=>{ if(ev.target.classList.contains("ovl")) onClose(); }}><div className="modal">
    <h2><span className="sededot" style={{background:sedeColor(sede),marginRight:8}}></span>Segreteria &mdash; {sede}</h2>
    <div className="field"><label>1) Scegli il giorno o i giorni</label>
      <div className="chips">{DAYS.map((x,i)=> <span key={i} className="chip" aria-pressed={selDays.indexOf(i)>=0} onClick={()=>toggle(i)}>{DAYS_SH[i]}</span>)}</div>
      <div style={{marginTop:6,display:"flex",gap:6,flexWrap:"wrap"}}>
        <button className="btn sm ghost" onClick={()=>setSelDays([0,1,2,3,4])}>Lun&ndash;Ven</button>
        <button className="btn sm ghost" onClick={()=>setSelDays([0,1,2,3,4,5,6])}>Tutti</button>
        <button className="btn sm ghost" onClick={()=>setSelDays([])}>Nessuno</button>
      </div>
    </div>
    <div className="row2">
      <div className="field"><label>2) Dalle</label><select value={s} onChange={ev=>setS(parseInt(ev.target.value,10))}>{Array.apply(null,{length:SLOTS}).map((x,i)=> <option key={i} value={i}>{slotToTime(i)}</option>)}</select></div>
      <div className="field"><label>Alle</label><select value={e} onChange={ev=>setE(parseInt(ev.target.value,10))}>{Array.apply(null,{length:SLOTS}).map((x,i)=> <option key={i+1} value={i+1}>{slotToTime(i+1)}</option>)}</select></div>
    </div>
    <div className="modal-actions" style={{marginBottom:8,justifyContent:"flex-start"}}><button className="btn sm" onClick={add}>+ Aggiungi un'altra fascia</button></div>
    <div>{list.length===0 && <div className="muted" style={{fontSize:13}}>Nessuna fascia impostata.</div>}
      {list.map((x,i)=> <div className="rolerow" key={i}><span>{DAYS[x.day]} &middot; {slotToTime(x.start)}&ndash;{slotToTime(x.end)}</span><button className="btn sm danger" onClick={()=>setList(p=>p.filter((y,j)=>j!==i))}>Rimuovi</button></div>)}</div>
    <div className="modal-actions" style={{marginTop:12}}><button className="btn ghost" onClick={onClose}>Annulla</button><button className="btn primary" onClick={save}>Salva</button></div>
  </div></div>);
}

/* ---------- nuovo anno ---------- */
function NewASModal({anni,onClose,onCreate}){
  const keys=Object.keys(anni);
  const [nome,setNome]=useState("");
  const [mode,setMode]=useState(keys.length>0?"dup":"vuoto");
  const [src,setSrc]=useState(keys.length>0?keys[keys.length-1]:"");
  function create(){ if(!nome.trim()){ alert("Indica il nome dell'anno (es. 2026/2027)."); return; } onCreate(nome.trim(),mode,src); onClose(); }
  const def=asPeriodDefault(nome);
  return (<div className="ovl open" onClick={ev=>{ if(ev.target.classList.contains("ovl")) onClose(); }}><div className="modal">
    <h2>Nuovo anno scolastico</h2>
    <div className="field"><label>Nome anno</label><input type="text" value={nome} placeholder="es. 2026/2027" onChange={ev=>setNome(ev.target.value)} /></div>
    <div className="field"><label>Come parte</label>
      <div className="radio">
        <label><input type="radio" checked={mode==="vuoto"} onChange={()=>setMode("vuoto")} /> Vuoto</label>
        {keys.length>0 && <label><input type="radio" checked={mode==="dup"} onChange={()=>setMode("dup")} /> Duplica da</label>}
        {mode==="dup" && <select value={src} onChange={ev=>setSrc(ev.target.value)}>{keys.map(k=> <option key={k} value={k}>{k}</option>)}</select>}
      </div></div>
    {mode==="vuoto" && <div className="muted" style={{fontSize:13}}>Parte con un unico <b>1&deg; periodo</b> da <b>{isoToIt(def.inizio)}</b> a <b>{isoToIt(def.fine)}</b>. Potrai far partire altri periodi quando vuoi con <b>+ Periodo</b>.</div>}
    {mode==="dup" && <div className="muted" style={{fontSize:13}}>Verranno copiati periodi, occupazioni e segreteria da <b>{src}</b>. Potrai modificarli dopo.</div>}
    <div className="modal-actions" style={{marginTop:14}}><button className="btn ghost" onClick={onClose}>Annulla</button><button className="btn primary" onClick={create}>Crea anno</button></div>
  </div></div>);
}

/* ---------- nuovo periodo (split) ---------- */
function NewPeriodoModal({periodi,onClose,onSplit}){
  const [data,setData]=useState(todayISO());
  const [nome,setNome]=useState((periodi.length+1)+"\u00B0 periodo");
  const [copy,setCopy]=useState(true);
  const cont = periodi.find(p=> p.inizio<data && data<=p.fine);
  function go(){ if(onSplit(data,nome,copy)) onClose(); }
  return (<div className="ovl open" onClick={ev=>{ if(ev.target.classList.contains("ovl")) onClose(); }}><div className="modal">
    <h2>Nuovo periodo</h2>
    <div className="row2">
      <div className="field"><label>Parte dal giorno</label><input type="date" value={data} onChange={ev=>setData(ev.target.value)} /></div>
      <div className="field"><label>Nome periodo</label><input type="text" value={nome} onChange={ev=>setNome(ev.target.value)} /></div>
    </div>
    <div className="field"><label>Contenuto</label>
      <div className="radio">
        <label><input type="radio" checked={copy} onChange={()=>setCopy(true)} /> Copia dal periodo precedente</label>
        <label><input type="radio" checked={!copy} onChange={()=>setCopy(false)} /> Vuoto</label>
      </div></div>
    {cont
      ? <div className="muted" style={{fontSize:13}}>Il periodo <b>{cont.nome}</b> verr&agrave; chiuso il <b>{isoToIt(dayBeforeISO(data))}</b>; il nuovo periodo andr&agrave; dal <b>{isoToIt(data)}</b> al <b>{isoToIt(cont.fine)}</b>.</div>
      : <div className="err">La data scelta non cade dentro un periodo esistente (o coincide col suo inizio).</div>}
    <div className="modal-actions" style={{marginTop:14}}><button className="btn ghost" onClick={onClose}>Annulla</button><button className="btn primary" onClick={go} disabled={!cont}>Crea periodo</button></div>
  </div></div>);
}

/* ---------- gestione periodi ---------- */
function PeriodiModal({as,periodi,onClose,onSave}){
  const [list,setList]=useState(periodi.map(p=>Object.assign({},p)));
  function addP(){ setList(p=>p.concat([{id:uid("p"),nome:(p.length+1)+"\u00B0 periodo",inizio:todayISO(),fine:todayISO()}])); }
  return (<div className="ovl open" onClick={ev=>{ if(ev.target.classList.contains("ovl")) onClose(); }}><div className="modal">
    <h2>Periodi &mdash; {as}</h2>
    {list.map((p,i)=> <div className="perrow" key={p.id}>
      <div className="field" style={{flex:2,marginBottom:0}}><label>Nome</label><input type="text" value={p.nome} onChange={ev=>setList(a=>a.map((x,j)=>j===i?Object.assign({},x,{nome:ev.target.value}):x))} /></div>
      <div className="field" style={{marginBottom:0}}><label>Inizio</label><input type="date" value={p.inizio} onChange={ev=>setList(a=>a.map((x,j)=>j===i?Object.assign({},x,{inizio:ev.target.value}):x))} /></div>
      <div className="field" style={{marginBottom:0}}><label>Fine</label><input type="date" value={p.fine} onChange={ev=>setList(a=>a.map((x,j)=>j===i?Object.assign({},x,{fine:ev.target.value}):x))} /></div>
      {list.length>1 && <button className="btn sm danger" onClick={()=>setList(a=>a.filter((x,j)=>j!==i))}>&times;</button>}
    </div>)}
    <div style={{marginTop:8}}><button className="btn sm" onClick={addP}>+ Periodo</button></div>
    <div className="muted" style={{fontSize:12,marginTop:8}}>Nota: rimuovere un periodo non cancella le occupazioni gi&agrave; inserite, ma non saranno pi&ugrave; visibili finch&eacute; il periodo non viene ricreato.</div>
    <div className="modal-actions" style={{marginTop:12}}><button className="btn ghost" onClick={onClose}>Annulla</button><button className="btn primary" onClick={()=>{ onSave(list); onClose(); }}>Applica</button></div>
  </div></div>);
}

/* ---------- griglie ---------- */
function inBands(bands,slot){ for(let i=0;i<bands.length;i++){ if(slot>=bands[i].start&&slot<bands[i].end) return true; } return false; }
function buildOcc(cols,scope){ const occ=cols.map(()=>new Array(SLOTS).fill(null));
  scope.forEach(b=>{ const ci=b.__col; if(ci<0) return; const s=Math.max(0,b.start),e=Math.min(SLOTS,b.end);
    for(let i=s;i<e;i++){ occ[ci][i]=(i===s)?{kind:"start",b:b,span:e-s}:{kind:"cov"}; } }); return occ; }

function certColor(c){ return c==="ok"?"#27AE60":(c==="chk"?"#FFB74D":""); }
function CertDot({o,canEdit,onCert}){ const c=o.cert||""; const col=certColor(c);
  const title=c==="ok"?"Certificato: tutto ok (clic per cambiare)":(c==="chk"?"Da verificare (clic per cambiare)":"Da certificare (clic: verde = ok, arancione = da verificare)");
  return <span className={"certdot"+(canEdit?" clk":"")} title={title} style={col?{background:col,borderColor:col}:undefined} onClick={canEdit?(ev=>{ ev.stopPropagation(); onCert(o); }):undefined}></span>;
}
function GridCore({cols,scope,canEdit,onEmpty,onBlock,onCert,railBands,colBands,segColor}){
  railBands=railBands||[]; const cb=colBands||function(){return [];};
  const occMat=buildOcc(cols,scope);
  function frame(bands,slot){ if(!inBands(bands,slot)) return null; const st={};
    st.borderLeft=SEG_BORDER+"px solid "+segColor; st.borderRight=SEG_BORDER+"px solid "+segColor;
    if(!inBands(bands,slot-1)) st.borderTop=SEG_BORDER+"px solid "+segColor;
    if(!inBands(bands,slot+1)) st.borderBottom=SEG_BORDER+"px solid "+segColor;
    st.background=hexToRgba(segColor,0.13); return st; }
  const rows=[];
  for(let r=0;r<SLOTS;r++){
    const isHour=((START_MIN+r*15)%60)===0; const rf=frame(railBands,r);
    const tds=[<td key="t" className="time-col" style={rf?rf:{}}>{slotToTime(r)}</td>];
    for(let c=0;c<cols.length;c++){ const cell=occMat[c][r]; const bands=cb(c);
      if(cell&&cell.kind==="cov") continue;
      if(cell&&cell.kind==="start"){ const b=cell.b,t=typeOf(b.tipo),ink=t.ink;
        const style={borderLeftColor:t.color,background:hexToRgba(t.color,0.16)};
        if(inBands(bands,b.start)) style.boxShadow="inset 0 0 0 "+SEG_BORDER+"px "+segColor;
        tds.push(<td key={c} rowSpan={cell.span} className={"block"+(canEdit?" clk":"")} style={style} onClick={canEdit?(()=>onBlock(b)):undefined}>{onCert?<CertDot o={b} canEdit={canEdit} onCert={onCert} />:null}
          <div className="act" style={ink?{color:ink}:undefined}>{b.att||"(senza titolo)"}</div>{b.att2?<div className="sub" style={ink?{color:ink}:undefined}>{b.att2}</div>:null}<div className="meta">{slotToTime(b.start)+"\u2013"+slotToTime(b.end)}</div><div className="tp" style={{color:ink||t.color}}>{t.label}</div>{perLabel(b.per,b.day)?<div className="per">{perLabel(b.per,b.day)}</div>:null}{(b.pay||b.ris)?<div className="flags">{b.pay==="free"?<span className="flag free">gratuito</span>:null}{b.pay==="paid"?<span className="flag paid">a pagamento</span>:null}{b.ris?<span className="flag ris">riservato{b.risA?": "+b.risA:""}</span>:null}</div>:null}</td>);
      } else { const ph=cols[c].ph; const f=frame(bands,r);
        tds.push(<td key={c} className={"cell empty"+(ph?" ph":"")+((canEdit)?" editable":"")} style={f?f:undefined} onClick={canEdit?(()=>onEmpty(c,r)):undefined}></td>);
      }
    }
    rows.push(<tr key={r} className={isHour?"hour":""}>{tds}</tr>);
  }
  return (<div className="grid-card"><div className="grid-scroll"><table>
    <thead><tr><th className="th0 time-col">Ora</th>{cols.map((c,i)=> <th key={i} className={c.ph?"ph":""} style={c.sedeColor?{background:hexToRgba(c.sedeColor,0.14)}:undefined}>{c.sede?<span className="cdqtag" style={{background:c.sedeColor,color:onColor(c.sedeColor)}}>{c.sede}</span>:null}{c.name}{c.floor?<span className="fl">{c.floor}</span>:(c.ph?<span className="fl">libera</span>:null)}</th>)}</tr></thead>
    <tbody>{rows}</tbody></table></div></div>);
}

function GridDay({sede,aula,day,occ,hitQT,canEdit,onCell,onBlock,onCert,segBands,segColor}){
  let cols=colsForSede(sede); if(aula!=="Tutte"){ cols=cols.filter(c=>c.name===aula); }
  const nameIdx={}; cols.forEach((c,i)=>nameIdx[c.name]=i);
  const scope=occ.filter(o=>o.sede===sede&&o.day===day&&nameIdx[o.room]!==undefined&&hitQT(o)).map(o=>Object.assign({},o,{__col:nameIdx[o.room]}));
  return <GridCore cols={cols} scope={scope} canEdit={canEdit} onCert={onCert} railBands={segBands} segColor={segColor}
            onEmpty={(ci,slot)=>onCell(sede,cols[ci].name,day,slot)} onBlock={onBlock} />;
}
function GridWeek({sede,aula,occ,hitQT,canEdit,onCell,onBlock,onCert,seg,segColor}){
  const allCols=colsForSede(sede); const theAula=(aula!=="Tutte")?aula:allCols[0].name;
  const cols=[0,1,2,3,4,5,6].map(d=>({name:DAYS[d],floor:"",ph:false,_d:d}));
  const scope=occ.filter(o=>o.sede===sede&&o.room===theAula&&hitQT(o)).map(o=>Object.assign({},o,{__col:o.day}));
  const colBands=(ci)=> seg.filter(x=>x.day===ci);
  return (<div>{aula==="Tutte" && <div className="banner">Vista settimana: aula <b>{theAula}</b>. Per un&apos;altra aula scegli dal filtro <b>Aula</b>.</div>}
    <GridCore cols={cols} scope={scope} canEdit={canEdit} onCert={onCert} colBands={colBands} segColor={segColor}
      onEmpty={(ci,slot)=>onCell(sede,theAula,ci,slot)} onBlock={onBlock} /></div>);
}
function GridDayAll({day,occ,hitQT,canEdit,onCell,onBlock,onCert}){
  const cols=[];
  SEDE_NAMES.forEach(s=>{ const aule=SEDI[s].slice(); const i0={}; aule.forEach((a,i)=>i0[a]=i); aule.sort((a,b)=>(floorRank(a)-floorRank(b))||(i0[a]-i0[b])); aule.forEach(a=>cols.push({name:a,floor:floorTok(a),ph:false,sede:s,sedeColor:sedeColor(s)})); });
  const idx={}; cols.forEach((c,i)=>idx[c.sede+"|"+c.name]=i);
  const scope=occ.filter(o=>o.day===day && idx[o.sede+"|"+o.room]!==undefined && hitQT(o)).map(o=>Object.assign({},o,{__col:idx[o.sede+"|"+o.room]}));
  return <GridCore cols={cols} scope={scope} canEdit={canEdit} onCert={onCert} segColor="#B0A99A"
            onEmpty={(ci,slot)=>onCell(cols[ci].sede,cols[ci].name,day,slot)} onBlock={onBlock} />;
}
function WeekGridAule({sede,aula,occ,hitQT,canEdit,onCell,onBlock,onCert}){
  let cols=colsForSede(sede); if(aula!=="Tutte"){ cols=cols.filter(c=>c.name===aula); }
  return (<div>{aula==="Tutte" && <div className="banner">Quadro settimana di <b>{sede}</b>: giorni in riga, aule in colonna. Clicca una cella per aggiungere, un'attivit&agrave; per modificarla.</div>}
    <div className="grid-card"><div className="grid-scroll"><table>
    <thead><tr><th className="th0 time-col">Giorno</th>{cols.map((c,i)=> <th key={i} className={c.ph?"ph":""}>{c.name}{c.floor?<span className="fl">{c.floor}</span>:(c.ph?<span className="fl">libera</span>:null)}</th>)}</tr></thead>
    <tbody>{DAYS.map((dn,d)=> <tr key={d}>
      <td className="time-col daycol">{DAYS_SH[d]}</td>
      {cols.map((c,ci)=>{ const items=occ.filter(o=>o.sede===sede&&o.room===c.name&&o.day===d&&hitQT(o)).sort((a,b)=>a.start-b.start);
        return <td key={ci} className={"wkcell"+(c.ph?" ph":"")+(canEdit?" editable":"")} onClick={canEdit?(()=>onCell(sede,c.name,d,4)):undefined}>
          {items.map(it=>{ const t=typeOf(it.tipo),ink=t.ink;
            return <div key={it.id} className="wkchip" style={{borderLeftColor:t.color,background:hexToRgba(t.color,0.16),color:ink||undefined}} onClick={canEdit?(ev=>{ ev.stopPropagation(); onBlock(it); }):undefined}>
              <CertDot o={it} canEdit={canEdit} onCert={onCert} /><span className="wa">{it.att}</span>{it.att2?<span className="wa2" style={ink?{color:ink}:undefined}>{it.att2}</span>:null}<span className="wt">{slotToTime(it.start)+"\u2013"+slotToTime(it.end)}</span>{perLabel(it.per,it.day)?<span className="wt" style={{fontStyle:"italic"}}>{perLabel(it.per,it.day)}</span>:null}</div>; })}
        </td>; })}
    </tr>)}</tbody>
    </table></div></div></div>);
}
function fmtH(min){ const h=Math.floor(min/60), m=min%60; return m?(h+"h "+(m<10?"0"+m:m)+"m"):(h+"h"); }
function isStructured(tipo){ return tipo==="corso"||tipo==="altra"||tipo==="esterni"; }
function nowStamp(){ const d=new Date(); const p={}; (new Intl.DateTimeFormat('en-GB',{timeZone:'Europe/Rome',day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false})).formatToParts(d).forEach(x=>p[x.type]=x.value);
  const mesi={Jan:'gen',Feb:'feb',Mar:'mar',Apr:'apr',May:'mag',Jun:'giu',Jul:'lug',Aug:'ago',Sep:'set',Oct:'ott',Nov:'nov',Dec:'dic'}; return p.day+(mesi[p.month]||p.month.toLowerCase())+p.year+" - "+p.hour+"."+p.minute; }
function exportExcel(rows){
  if(typeof XLSX==="undefined"){ alert("La libreria Excel non \u00E8 ancora pronta (o manca la connessione). Riprova tra un istante."); return; }
  const payL={"":"","free":"Gratuito","paid":"A pagamento"}; const certL={"":"Da certificare","ok":"Tutto ok","chk":"Da verificare"};
  const data=rows.map(o=>({ "Sede":o.sede, "Aula":o.room, "Giorno":DAYS[o.day], "Dalle":slotToTime(o.start), "Alle":slotToTime(o.end), "Ore":(o.end-o.start)/4, "Tipo":typeOf(o.tipo).label, "Attivit\u00E0":o.att, "Disciplina":o.att2||"", "Periodicit\u00E0":perLabel(o.per,o.day)||"Ogni settimana", "Certificazione":certL[o.cert||""], "Riservato":o.ris?"S\u00EC":"", "A chi":o.ris?(o.risA||""):"", "Costo":payL[o.pay||""] }));
  const ws=XLSX.utils.json_to_sheet(data); ws["!cols"]=[{wch:14},{wch:16},{wch:9},{wch:7},{wch:7},{wch:6},{wch:22},{wch:26},{wch:18},{wch:16},{wch:14},{wch:9},{wch:20},{wch:14}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Occupazioni");
  XLSX.writeFile(wb, "Calendario CDQ Spazio Ireos - Elenco "+nowStamp()+".xlsx");
}
function ListView({occ,sede,aula,giornoF,certF,risF,payF,hitQT,canEdit,onBlock,onCert}){
  let rows=occ.filter(o=>{ if(sede!=="Tutte"&&o.sede!==sede) return false; if(aula!=="Tutte"&&o.room!==aula) return false; if(giornoF!=="tutti"&&o.day!==parseInt(giornoF,10)) return false; if(certF&&certF!=="tutti"){ const c=o.cert||""; if(certF==="none"?c!=="":c!==certF) return false; } if(risF==="si"&&!o.ris) return false; if(risF==="no"&&o.ris) return false; if(payF&&payF!=="tutti"){ const pp=o.pay||""; if(payF==="none"?pp!=="":pp!==payF) return false; } return hitQT(o); });
  rows.sort((a,b)=> a.sede.localeCompare(b.sede)||a.day-b.day||a.start-b.start||a.room.localeCompare(b.room));
  if(rows.length===0) return <div className="grid-card"><div className="empty-state">Nessuna occupazione corrisponde ai filtri.</div></div>;
  const totMin={}; rows.forEach(o=>{ totMin[o.tipo]=(totMin[o.tipo]||0)+(o.end-o.start)*15; });
  let grand=0; TYPES.forEach(t=>{ grand+=(totMin[t.key]||0); });
  return (<div>
    <div style={{display:"flex",justifyContent:"flex-end",marginBottom:6}}><button className="btn sm" onClick={()=>exportExcel(rows)}>Esporta Excel</button></div>
    <div className="grid-card"><div className="grid-scroll"><table className="list">
    <thead><tr><th>Sede</th><th>Aula</th><th>Giorno</th><th>Orario</th><th>Attivit&agrave;</th><th>Tipo</th></tr></thead>
    <tbody>{rows.map(o=>{ const t=typeOf(o.tipo);
      return <tr key={o.id} onClick={canEdit?(()=>onBlock(o)):undefined}>
        <td><span className="sedepill"><span className="d" style={{background:sedeColor(o.sede)}}></span>{o.sede}</span></td>
        <td>{o.room}</td><td>{DAYS[o.day]}</td><td style={{whiteSpace:"nowrap"}}>{slotToTime(o.start)+"\u2013"+slotToTime(o.end)}</td>
        <td style={t.ink?{color:t.ink,fontWeight:700}:undefined}><CertDot o={o} canEdit={canEdit} onCert={onCert} /> {o.att}{o.att2?<span style={t.ink?{color:t.ink}:{color:"var(--muted)"}}> &middot; {o.att2}</span>:null}{perLabel(o.per,o.day)?<span className="muted" style={{fontStyle:"italic"}}> &middot; {perLabel(o.per,o.day)}</span>:null}{o.pay==="free"?<span className="lflag free">gratuito</span>:null}{o.pay==="paid"?<span className="lflag paid">a pagamento</span>:null}{o.ris?<span className="lflag ris">riservato{o.risA?": "+o.risA:""}</span>:null}</td><td><span className="pill" style={{borderLeftColor:t.color,background:hexToRgba(t.color,0.16),color:t.ink||undefined,fontWeight:t.ink?800:700}}>{t.label}</span></td></tr>; })}</tbody>
  </table></div>
  <div className="totbar">
    <span className="totlbl">Totale ore per tipologia (filtro corrente):</span>
    {TYPES.map(t=> <span key={t.key} className="totchip"><span className="sw" style={{background:t.color}}></span>{t.label}: <b style={t.ink?{color:t.ink}:undefined}>{fmtH(totMin[t.key]||0)}</b></span>)}
    <span className="totchip tot">&middot; Totale: <b>{fmtH(grand)}</b></span>
  </div>
  </div></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
